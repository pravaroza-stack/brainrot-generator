name: Daily Brainrot Generator

on:
  schedule:
    # Runs daily at 10:00 AM UTC (3:30 PM IST)
    - cron: '0 10 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install requests

      - name: Download background video
        run: |
          # Use a free stock video (Pexels - satisfying/abstract loop)
          curl -L -o videoplayback.mp4 "https://videos.pexels.com/video-files/3129671/3129671-uhd_2560_1440_30fps.mp4" || \
          curl -L -o videoplayback.mp4 "https://videos.pexels.com/video-files/856973/856973-hd_1920_1080_30fps.mp4" || \
          # Fallback: generate a simple colored background video
          ffmpeg -f lavfi -i color=c=purple:s=720x1280:d=120 -f lavfi -i anullsrc -shortest -c:v libx264 -pix_fmt yuv420p videoplayback.mp4

      - name: Generate and upload video
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          python generate_and_upload.py

      - name: Update topics index
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add topics.json
          git diff --staged --quiet || git commit -m "Update topic index after video generation"
          git push
